<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" role="img" aria-label="Carte de France avec nos lieux d'accueil">
  <defs>
    <linearGradient id="franceGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C6E7D6"/>
      <stop offset="100%" stop-color="#CFE6F5"/>
    </linearGradient>
  </defs>
  <!-- Stylised hexagonal France outline -->
  <path d="
    M175 30
    Q220 25 255 55
    Q300 70 325 120
    Q345 160 335 210
    Q345 250 325 285
    Q300 320 275 340
    Q240 375 200 385
    Q160 380 125 350
    Q90 320 75 275
    Q60 230 70 185
    Q75 140 105 95
    Q135 55 175 30 Z"
    fill="url(#franceGrad)"
    stroke="#3B3B54"
    stroke-width="2.5"
    stroke-linejoin="round"/>

  <!-- Corsica -->
  <path d="M335 345 Q345 340 352 355 Q358 375 348 385 Q340 390 334 378 Q328 362 335 345 Z"
    fill="url(#franceGrad)" stroke="#3B3B54" stroke-width="2"/>

  <!-- City labels + markers -->
  <!-- Paris -->
  <circle cx="215" cy="130" r="8" fill="#F7C9D9" stroke="#3B3B54" stroke-width="2"/>
  <text x="228" y="134" font-family="system-ui, sans-serif" font-size="14" fill="#3B3B54" font-weight="600">Paris</text>

  <!-- Lyon -->
  <circle cx="260" cy="215" r="7" fill="#D9D2F1" stroke="#3B3B54" stroke-width="2"/>
  <text x="272" y="219" font-family="system-ui, sans-serif" font-size="13" fill="#3B3B54">Lyon</text>

  <!-- Marseille -->
  <circle cx="270" cy="310" r="7" fill="#FFD8BE" stroke="#3B3B54" stroke-width="2"/>
  <text x="282" y="314" font-family="system-ui, sans-serif" font-size="13" fill="#3B3B54">Marseille</text>

  <!-- Bordeaux -->
  <circle cx="130" cy="255" r="7" fill="#C6E7D6" stroke="#3B3B54" stroke-width="2"/>
  <text x="60" y="259" font-family="system-ui, sans-serif" font-size="13" fill="#3B3B54">Bordeaux</text>

  <!-- Lille -->
  <circle cx="225" cy="60" r="6" fill="#CFE6F5" stroke="#3B3B54" stroke-width="2"/>
  <text x="235" y="64" font-family="system-ui, sans-serif" font-size="13" fill="#3B3B54">Lille</text>
</svg>
